name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:dind
        options: --privileged
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
      - name: Run tests
        run: |
          bazel test //... \
            --test_output=all \
            --test_env=DOCKER_HOST \
            --test_env=TESTCONTAINERS_RYUK_DISABLED=true \
            --sandbox_default_allow_network \
            --strategy=TestRunner=local

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
      - name: Validate semver tag
        run: tools/check-version.sh
      - name: Build binaries
        run: |
          bazel build --stamp \
            //cmd/gossl:gossl_linux_amd64 \
            //cmd/gossl:gossl_linux_arm64 \
            //cmd/gossl:gossl_darwin_amd64 \
            //cmd/gossl:gossl_darwin_arm64
      - name: Collect artifacts
        run: |
          mkdir -p dist
          for target in linux_amd64 linux_arm64 darwin_amd64 darwin_arm64; do
            path=$(bazel cquery "//cmd/gossl:gossl_${target}" \
              --output=starlark \
              --starlark:expr="target.files.to_list()[0].path" 2>/dev/null | grep "bazel-out")
            cp "${path}" "dist/gossl_${GITHUB_REF_NAME}_${target}"
          done
          cd dist && sha256sum gossl_* > checksums.txt
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
